x-airflow-common: &airflow-common
  image: apache/airflow:${AIRFLOW_VERSION:-2.10.4}
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${WEBSERVER_SECRET_KEY:-change-me}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW_UID: "1200"
    AIRFLOW_GID: "0"
  volumes:
    - airflow-dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  networks:
    - backend

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == manager
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - backend
    deploy:
      placement:
        constraints:
          - node.labels.role == manager
      resources:
        limits:
          memory: 300M

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@home.lab
      "
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      placement:
        constraints:
          - node.labels.role == manager

  webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  scheduler:
    <<: *airflow-common
    command: airflow scheduler
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager
      resources:
        limits:
          memory: 1G

  worker:
    <<: *airflow-common
    command: airflow celery worker
    deploy:
      mode: global
      resources:
        limits:
          memory: 2G

  flower:
    <<: *airflow-common
    command: airflow celery flower
    ports:
      - "5555:5555"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager
      resources:
        limits:
          memory: 256M

volumes:
  postgres-data:
    driver: local
  airflow-dags:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nfs/airflow_dags
  airflow-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nfs/airflow_logs
  airflow-plugins:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nfs/airflow_plugins

networks:
  backend:
    external: true

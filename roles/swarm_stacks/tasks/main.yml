---
# roles/swarm_stacks/tasks/main.yml
# Runs on the manager node only

- name: Create stacks directory on manager
  ansible.builtin.file:
    path: /opt/swarm-stacks/{{ item }}
    state: directory
    mode: "0755"
  loop:
    - airflow
    - minio
    - monitoring
    - jupyter

- name: Copy stack compose files
  ansible.builtin.copy:
    src: "{{ item }}/docker-compose.yml"
    dest: "/opt/swarm-stacks/{{ item }}/docker-compose.yml"
    mode: "0644"
  loop:
    - airflow
    - minio
    - monitoring
    - jupyter

- name: Create .env file for stacks
  ansible.builtin.template:
    src: stack-env.j2
    dest: /opt/swarm-stacks/.env
    mode: "0600"

- name: Ensure Prometheus config directory exists
  ansible.builtin.file:
    path: "{{ nfs_export_base }}/shared/prometheus"
    state: directory
    mode: "0755"

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ nfs_export_base }}/shared/prometheus/prometheus.yml"
    mode: "0644"

- name: Deploy stacks
  ansible.builtin.shell: |
    set -a
    source /opt/swarm-stacks/.env
    set +a
    docker stack deploy -c /opt/swarm-stacks/{{ item }}/docker-compose.yml {{ item }}
  loop:
    - monitoring
    - minio
    - airflow
    - jupyter
  changed_when: true
  environment:
    DOCKER_HOST: unix:///var/run/docker.sock

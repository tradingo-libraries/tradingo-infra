---
# roles/common/tasks/packages.yml

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe
  when: ansible_run_tags is not defined or 'packages' in ansible_run_tags

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - nfs-common
      - wireguard
      - htop
      - iotop
      - tmux
      - jq
      - git
      - unzip
      - net-tools
      - python3
      - python3-pip
      - fail2ban
    state: present

---
# roles/users/tasks/main.yml

- name: Create groups with consistent GIDs
  ansible.builtin.group:
    name: "{{ item.name }}"
    gid: "{{ item.gid | default(omit) }}"
    state: present
  loop: "{{ user_groups }}"
  loop_control:
    label: "{{ item.name }} ({{ item.gid | default('auto') }})"

# Handle the install user (UID 1000) — Ubuntu creates one during install
# that may have a different name than our 'admin' user.
# We cannot rename a logged-in user, so we check whether we are currently
# connected as that install user. If so, skip the rename — the "Create users"
# task will create 'admin' as a new user instead. On a subsequent run
# (connected as admin), the rename can proceed.
- name: Check if UID 1000 exists with wrong name
  ansible.builtin.shell: |
    existing=$(getent passwd 1000 | cut -d: -f1)
    if [ -n "$existing" ] && [ "$existing" != "admin" ]; then
      echo "$existing"
    fi
  register: wrong_name_user
  changed_when: false

- name: Rename install user to admin if needed
  ansible.builtin.command: >
    usermod -l admin -d /home/admin -m {{ wrong_name_user.stdout }}
  when:
    - wrong_name_user.stdout != ""
    - ansible_user != wrong_name_user.stdout

- name: Create users
  ansible.builtin.user:
    name: "{{ item.username }}"
    uid: "{{ item.uid }}"
    group: "{{ item.group }}"
    groups: "{{ item.extra_groups }}"
    append: true
    shell: "{{ item.shell }}"
    comment: "{{ item.comment }}"
    create_home: "{{ item.create_home }}"
    state: present
  loop: "{{ users }}"
  loop_control:
    label: "{{ item.username }} ({{ item.uid }})"
  when: item.username != ansible_user

- name: Set up SSH directories for interactive users
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh"
    state: directory
    owner: "{{ item }}"
    mode: "0700"
  loop: "{{ ssh_users }}"

- name: Ensure authorized_keys files exist
  ansible.builtin.file:
    path: "/home/{{ item }}/.ssh/authorized_keys"
    state: touch
    owner: "{{ item }}"
    mode: "0600"
  loop: "{{ ssh_users }}"
  changed_when: false

- name: Copy connecting user's authorized_keys to all ssh users
  ansible.builtin.copy:
    src: "/home/{{ ansible_user }}/.ssh/authorized_keys"
    dest: "/home/{{ item }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ item }}"
    mode: "0600"
  loop: "{{ ssh_users }}"
  when: ansible_user != item

- name: Grant admin passwordless sudo
  ansible.builtin.copy:
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/admin
    mode: "0440"
    validate: "visudo -cf %s"

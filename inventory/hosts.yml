---
all:
  children:
    # --- Swarm cluster (home LAN) ---
    swarm:
      children:
        managers:
          hosts:
            nuc-05:
              ansible_host: 192.168.1.54
              swarm_role: manager
              swarm_labels:
                role: manager
                node: nuc-05
                workload: platform
        workers:
          hosts:
            nuc-01:
              ansible_host: 192.168.1.50
              swarm_role: worker
              swarm_labels:
                role: worker
                node: nuc-01
                workload: compute
            nuc-02:
              ansible_host: 192.168.1.51
              swarm_role: worker
              swarm_labels:
                role: worker
                node: nuc-02
                workload: minio
            nuc-03:
              ansible_host: 192.168.1.52
              swarm_role: worker
              swarm_labels:
                role: worker
                node: nuc-03
                workload: compute
            nuc-04:
              ansible_host: 192.168.1.53
              swarm_role: worker
              swarm_labels:
                role: worker
                node: nuc-04
                workload: compute

    # --- NFS ---
    nfs_servers:
      hosts:
        nuc-01:
    nfs_clients:
      hosts:
        nuc-02:
        nuc-03:
        nuc-04:
        nuc-05:

    # --- WireGuard ---
    gateway:
      hosts:
        gateway:
          ansible_host: "{{ do_public_ip }}"
          ansible_user: "{{ do_ssh_user }}"

---
all:
  children:
    # --- Swarm cluster (home LAN) ---
    swarm:
      children:
        managers:
          hosts:
            nuc-01:
              ansible_host: 10.8.0.2 # LAN fallback: 192.168.1.50
              swarm_role: manager
              swarm_labels:
                role: manager
                node: nuc-01
        workers:
          hosts:
            nuc-02:
              ansible_host: 10.8.0.4 # LAN fallback: 192.168.1.51
              swarm_role: worker
              swarm_labels:
                role: worker
                node: nuc-02
            # nuc-03:
            #   ansible_host: 192.168.1.52
            #   swarm_role: worker
            #   swarm_labels:
            #     role: worker
            #     node: nuc-03

    # --- NFS ---
    nfs_servers:
      hosts:
        nuc-01:
    nfs_clients:
      hosts:
        nuc-02:
        # nuc-03:

    # --- WireGuard ---
    gateway:
      hosts:
        gateway:
          ansible_host: "{{ do_public_ip }}"
          ansible_user: "{{ do_ssh_user }}"

---
# playbooks/sync-platform.yml — Sync tradingo-plat repo to NFS exports
#
# Clones/updates tradingo-plat at a given git tag on the NFS server,
# then rsyncs dags, config, plugins, notebooks, scripts to NFS shares.
#
# Usage:
#   ansible-playbook playbooks/sync-platform.yml -e tradingo_plat_version=v1.2.0
#   ansible-playbook playbooks/sync-platform.yml -e tradingo_plat_version=main

- name: Sync tradingo-plat to NFS exports
  hosts: nfs_servers
  become: true
  tasks:
    - name: Validate version is provided
      ansible.builtin.assert:
        that:
          - tradingo_plat_version is defined
          - tradingo_plat_version | length > 0
        fail_msg: "Pass -e tradingo_plat_version=<tag> to specify which version to sync"

    - name: Include sync-repo tasks
      ansible.builtin.include_tasks:
        file: "{{ playbook_dir }}/../roles/nfs_server/tasks/sync-repo.yml"

    - name: Fetch docker-stack.yaml to controller
      ansible.builtin.fetch:
        src: "{{ tradingo_plat_clone_dir }}/docker-stack.yaml"
        dest: "/tmp/docker-stack.yaml"
        flat: true

- name: Deploy docker-stack.yaml to swarm manager
  hosts: managers
  become: true
  tasks:
    - name: Ensure stack deploy directory exists
      ansible.builtin.file:
        path: "{{ stack_deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Copy docker-stack.yaml to manager
      ansible.builtin.copy:
        src: "/tmp/docker-stack.yaml"
        dest: "{{ stack_deploy_dir }}/docker-stack.yaml"
        mode: "0644"

---
# playbooks/setup-wireguard.yml — Configure WireGuard on the manager node only
# Usage: ansible-playbook playbooks/setup-wireguard.yml
# Requires: setup-gateway.yml has been run first
#
# Workers do not run WireGuard — they are reached via the manager as a jump host.
# See inventory/group_vars/workers.yml for the SSH proxy config.

- name: Setup WireGuard peer on manager
  hosts: managers
  become: true
  roles:
    - role: wireguard_peer
      tags: [wireguard]
